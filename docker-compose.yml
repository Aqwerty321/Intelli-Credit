###############################################################################
# docker-compose.yml — Intelli-Credit Microservices
# Defines: firecrawl-simple, playwright worker, monitoring
# GPU services (GLM-OCR, DeepSeek) run natively for VRAM control
###############################################################################
version: '3.8'

services:
  ##############################################################################
  # Firecrawl-Simple — Stealth web extraction
  ##############################################################################
  firecrawl:
    image: ghcr.io/karlicoss/firecrawl-simple:latest
    container_name: intelli-firecrawl
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - NUM_WORKERS=2
      - PLAYWRIGHT_TIMEOUT=30000
    mem_limit: 4g
    cpus: 2.0
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ##############################################################################
  # Redis — Cache for Firecrawl and agent state
  ##############################################################################
  redis:
    image: redis:7-alpine
    container_name: intelli-redis
    ports:
      - "6379:6379"
    mem_limit: 512m
    cpus: 0.5
    volumes:
      - redis_data:/data
    restart: unless-stopped

  ##############################################################################
  # MongoDB — Cache for Crocodile entity resolution
  ##############################################################################
  mongo:
    image: mongo:7
    container_name: intelli-mongo
    ports:
      - "27017:27017"
    mem_limit: 2g
    cpus: 1.0
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=intelli_credit
    restart: unless-stopped

  ##############################################################################
  # SearXNG — Self-hosted meta-search engine for research agent
  ##############################################################################
  searxng:
    image: searxng/searxng:latest
    container_name: intelli-searxng
    ports:
      - "8888:8080"
    mem_limit: 1g
    cpus: 1.0
    volumes:
      - ./config/searxng:/etc/searxng:rw
      - searxng_data:/var/log/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    restart: unless-stopped

volumes:
  redis_data:
  mongo_data:
  searxng_data:
