# Rule 0003: Days Past Due Threshold — v2
---
rule_id: "0003"
slug: "dpd-threshold"
version: "2.0"
severity: "HIGH"
category: "credit_history"

description: >
  Evaluates Days Past Due (DPD) from CIBIL/credit bureau reports.
  DPD >= 30 is an early warning signal; >= 90 triggers NPA classification.

condition:
  type: "threshold_comparison"
  field: "max_dpd_last_12m"
  direction: "above"
  thresholds:
    - level: "warning"
      value: 30
      severity: "MEDIUM"
      risk_adjustment: 0.10
    - level: "flag"
      value: 60
      severity: "HIGH"
      risk_adjustment: 0.20
    - level: "hard_constraint"
      value: 90
      severity: "CRITICAL"
      risk_adjustment: 0.40

action:
  flag: "RED_FLAG"
  cam_section: "character"
  rationale_template: >
    Maximum DPD of {max_dpd_last_12m} days recorded in the last 12 months.
    {threshold_severity} risk per RBI NPA norms (level: {threshold_level}).

pyreason_predicate: |
  dpd_risk(Company, high) :- [threshold, 1.0]
    cibil_dpd(Company, FacilityId, DPD), DPD > 90
  dpd_risk(Company, medium) :- [threshold, 1.0]
    cibil_dpd(Company, FacilityId, DPD), DPD > 30, DPD <= 90

tests:
  - input: { max_dpd_last_12m: 120 }
    expected: { flag: "RED_FLAG", risk_adjustment: 0.40 }
  - input: { max_dpd_last_12m: 45 }
    expected: { flag: "RED_FLAG", risk_adjustment: 0.10 }
  - input: { max_dpd_last_12m: 15 }
    expected: { flag: null }
