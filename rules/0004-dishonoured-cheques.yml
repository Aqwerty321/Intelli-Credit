# Rule 0004: Dishonoured Cheques — v2
---
rule_id: "0004"
slug: "dishonoured-cheques"
version: "2.0"
severity: "HIGH"
category: "credit_history"

description: >
  Counts dishonoured (bounced) cheques in a 12-month period.
  More than 3 indicates poor financial discipline.

condition:
  type: "count_threshold"
  field: "dishonoured_cheque_count_12m"
  threshold: 3
  period_months: 12

action:
  flag: "RED_FLAG"
  risk_adjustment: 0.20
  cam_section: "character"
  rationale_template: >
    {dishonoured_cheque_count_12m} dishonoured cheques detected in the last
    12 months. Exceeds threshold of 3, indicating poor financial discipline.

pyreason_predicate: |
  dishonoured_risk(Company) :- [threshold, 1.0]
    dishonoured_cheque_count(Company, Period12M, Count), Count > 3

tests:
  - input: { dishonoured_cheque_count_12m: 5 }
    expected: { flag: "RED_FLAG", risk_adjustment: 0.20 }
  - input: { dishonoured_cheque_count_12m: 2 }
    expected: { flag: null }
