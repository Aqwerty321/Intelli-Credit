# Rule 0005: CIBIL CMR Threshold — v2
---
rule_id: "0005"
slug: "cibil-cmr-threshold"
version: "2.0"
severity: "HIGH"
category: "credit_history"

description: >
  Evaluates the CIBIL MSME Rank (CMR) 1-10 (1=lowest risk, 10=highest risk).
  CMR >= 6 is a warning; >= 7 is a flag; >= 9 is critical.

condition:
  type: "threshold_comparison"
  field: "cibil_cmr_rank"
  direction: "above"
  thresholds:
    - level: "warning"
      value: 6
      severity: "MEDIUM"
      risk_adjustment: 0.10
    - level: "flag"
      value: 7
      severity: "HIGH"
      risk_adjustment: 0.25
    - level: "hard_constraint"
      value: 9
      severity: "CRITICAL"
      risk_adjustment: 0.40

action:
  flag: "RED_FLAG"
  cam_section: "character"
  rationale_template: >
    CIBIL MSME Rank (CMR) is {cibil_cmr_rank}/10 — {threshold_severity} credit
    risk (level: {threshold_level}).

pyreason_predicate: |
  cmr_risk(Company, critical) :- [threshold, 1.0]
    cibil_cmr(Company, CMR), CMR >= 9
  cmr_risk(Company, high) :- [threshold, 1.0]
    cibil_cmr(Company, CMR), CMR >= 7, CMR < 9

tests:
  - input: { cibil_cmr_rank: 9 }
    expected: { flag: "RED_FLAG", risk_adjustment: 0.40 }
  - input: { cibil_cmr_rank: 7 }
    expected: { flag: "RED_FLAG", risk_adjustment: 0.25 }
  - input: { cibil_cmr_rank: 4 }
    expected: { flag: null }
